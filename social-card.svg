<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">mac-onboarding social preview</title>
  <desc id="desc">Terminal-style social card for mac-onboarding with title, privacy-first subtitle, and sample commands.</desc>
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="50%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="#0d1117"/>
  <circle cx="1060" cy="92" r="160" fill="#0f172a" opacity="0.65"/>
  <circle cx="1110" cy="128" r="88" fill="#111827" opacity="0.65"/>
  <rect x="64" y="54" width="1072" height="522" rx="22" fill="url(#frame)" stroke="#30363d" stroke-width="2" filter="url(#shadow)"/>
  <rect x="64" y="54" width="1072" height="12" rx="6" fill="url(#glow)"/>

  <circle cx="106" cy="100" r="7" fill="#f87171"/>
  <circle cx="130" cy="100" r="7" fill="#fbbf24"/>
  <circle cx="154" cy="100" r="7" fill="#4ade80"/>

  <text x="190" y="106" fill="#94a3b8" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="19">mac-onboarding</text>

  <text x="108" y="192" fill="#f8fafc" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="68" font-weight="700">mac-onboarding</text>
  <text x="112" y="242" fill="#22c55e" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="28">$ export, bridge, install</text>
  <text x="108" y="294" fill="#cbd5e1" font-family="Inter, Arial, sans-serif" font-size="28">
    <tspan x="108" dy="0">Privacy-first macOS configuration bootstrapper</tspan>
    <tspan x="108" dy="36">for managed and personal Macs.</tspan>
  </text>
  <text x="108" y="370" fill="#94a3b8" font-family="Inter, Arial, sans-serif" font-size="22">
    <tspan x="108" dy="0">Export apps, shell config, system settings, hotkeys, and app preferences.</tspan>
    <tspan x="108" dy="30">Restore without iCloud or Time Machine.</tspan>
  </text>

  <rect x="108" y="410" width="456" height="126" rx="16" fill="#0b1220" stroke="#1f2937"/>
  <text x="132" y="448" fill="#94a3b8" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="19">source Mac</text>
  <text x="132" y="484" fill="#e2e8f0" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="20">$ mac-onboarding export ~/setup.tar.gz</text>
  <text x="132" y="516" fill="#22c55e" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="18">captures brew, shell, git, system, hotkeys</text>

  <rect x="606" y="410" width="420" height="126" rx="16" fill="#0b1220" stroke="#1f2937"/>
  <text x="630" y="448" fill="#94a3b8" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="19">target Mac</text>
  <text x="630" y="484" fill="#e2e8f0" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="18">$ mac-onboarding install ~/setup.tar.gz</text>
  <text x="630" y="516" fill="#38bdf8" font-family="Menlo, Monaco, 'SF Mono', monospace" font-size="18">or bridge pull over Tailscale SSH</text>

  <rect x="848" y="140" width="214" height="42" rx="12" fill="#131c2f" stroke="#1d4ed8"/>
  <text x="871" y="168" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-size="20">MDM-aware</text>

  <rect x="848" y="194" width="214" height="42" rx="12" fill="#15231d" stroke="#15803d"/>
  <text x="871" y="222" fill="#bbf7d0" font-family="Inter, Arial, sans-serif" font-size="20">Secrets redacted</text>

  <rect x="848" y="248" width="214" height="42" rx="12" fill="#261d12" stroke="#d97706"/>
  <text x="871" y="276" fill="#fde68a" font-family="Inter, Arial, sans-serif" font-size="20">Homebrew + dotfiles</text>

  <text x="108" y="566" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="19">mac.olegkoval.com</text>
</svg>
