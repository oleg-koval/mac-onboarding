name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Run go test
        run: go test ./... -v -race

      - name: Run go vet
        run: go vet ./...

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run go fmt check
        run: |
          if gofmt -l . | grep -q .; then
            echo "Go fmt check failed:"
            gofmt -d .
            exit 1
          fi

      - name: Build binary
        run: go build -o mac-onboarding

      - name: Verify binary runs
        run: ./mac-onboarding --version 2>&1 | head -1
