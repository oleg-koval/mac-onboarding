<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">mac-onboarding logo</title>
  <desc id="desc">Funky sync-style logo with dual circular arrows, neon accents, and a dark terminal-inspired frame.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101827"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="55%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="syncA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <linearGradient id="syncB" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="10" flood-color="#38bdf8" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="#0d1117"/>
  <rect x="48" y="48" width="416" height="416" rx="64" fill="url(#bg)" stroke="#30363d" stroke-width="8"/>
  <rect x="48" y="48" width="416" height="16" rx="8" fill="url(#edge)"/>

  <circle cx="96" cy="99" r="9" fill="#f87171"/>
  <circle cx="125" cy="99" r="9" fill="#fbbf24"/>
  <circle cx="154" cy="99" r="9" fill="#4ade80"/>

  <g filter="url(#softGlow)">
    <path d="M324 134c54 24 93 75 101 137" fill="none" stroke="url(#syncA)" stroke-linecap="round" stroke-width="34"/>
    <path d="M391 238l34 33-46 8" fill="none" stroke="url(#syncA)" stroke-linecap="round" stroke-linejoin="round" stroke-width="26"/>

    <path d="M188 378c-58-22-99-74-107-139" fill="none" stroke="url(#syncB)" stroke-linecap="round" stroke-width="34"/>
    <path d="M117 272l-36-33 48-10" fill="none" stroke="url(#syncB)" stroke-linecap="round" stroke-linejoin="round" stroke-width="26"/>
  </g>

  <circle cx="256" cy="256" r="90" fill="#0f172a" stroke="#223047" stroke-width="8"/>
  <path d="M214 234l42 42 42-42" fill="none" stroke="#e2e8f0" stroke-linecap="round" stroke-linejoin="round" stroke-width="20"/>
  <path d="M214 286h84" fill="none" stroke="#cbd5e1" stroke-linecap="round" stroke-width="18"/>

  <circle cx="187" cy="175" r="9" fill="#22c55e"/>
  <circle cx="338" cy="341" r="11" fill="#38bdf8"/>
  <circle cx="352" cy="174" r="8" fill="#f59e0b"/>
</svg>
